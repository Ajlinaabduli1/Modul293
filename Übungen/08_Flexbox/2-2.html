<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alternative Bildgrössen</title>

  <style>
    img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>

<body>

  <h1>Responsive Bilder mit srcset</h1>

  <img 
    src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" >

   srcset="bild-400.jpg 400w, bild-800.jpg 800w, bild-1200.jpg 1200w"
  sizes="100vw"
    alt="Naturbild"
  >

</body>
</html>
